<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4" style="background-color:rgb(11, 84, 161);">
        <h1 class="text-white">Aplicativo Word</h1>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Insertar Word</a></li>
                <li class="nav-item"><a class="nav-link active" href="/articulos">Artículos</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <h4>Artículos en la base de datos</h4>
        <table class="table table-striped table-hover table-bordered align-middle mt-3">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>DOI</th>
                    <th>Revista</th>
                    <th>Recibido</th>
                    <th>Aceptado</th>
                </tr>
            </thead>
            <tbody>
            {% for art in articulos %}
                <tr>
                    <td>{{ art[0] }}</td>
                    <td>{{ art[1] }}</td>
                    <td>{{ art[3] }}</td>
                    <td>{{ art[4] }}</td>
                    <td>{{ art[5] }}</td>
                    <td>{{ art[6] }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
