<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4" style="background-color:rgb(11, 84, 161);">
        <h1 class="text-white">Aplicativo Word</h1>
    </nav>

    <div class="container mt-4">
        <a href="/" class="btn btn-secondary mb-3">← Volver</a>
        
        {% if articulos %}
            <h4>Archivos procesados: {{ articulos|length }}</h4>
            {% for articulo in articulos %}
            <div class="card mb-3">
                <div class="card-header" style="background-color:rgb(11, 84, 161); color:white;">
                    {{ articulo.archivo }}
                </div>
                <div class="card-body">
                    {% for parrafo in articulo.parrafos %}
                        <p>{{ parrafo }}</p>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p>No se encontraron archivos Word en el ZIP.</p>
        {% endif %}
    </div>
</body>
</html>
