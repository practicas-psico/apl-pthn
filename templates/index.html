<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicativo Word</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4" style="background-color:rgb(11, 84, 161);">
        <h1 class="text-white">Aplicativo Word</h1>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Insertar Word</a></li>
                <li class="nav-item"><a class="nav-link" href="/articulos">Artículos</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header" style="background-color:rgb(11, 84, 161); color:white;">
                <h5 class="mb-0">Insertar archivo Word</h5>
            </div>
            <div class="card-body">
                <form action="/subir" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Revista</label>
                        <select name="journal_id" class="form-select">
                            {% for journal in journals %}
                                <option value="{{ journal }}">{{ journal }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Archivo Word</label>
                        <input type="file" name="word" accept=".docx" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Subir y procesar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
